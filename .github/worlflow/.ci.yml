name: .NET

on:
  push:
    branches: ["publish"]
  pull_request:
    branches: ["publish"]

jobs:
  # Job 1: Bygger backend + frontend och publicerar artefakter som andra jobb kan använda.
  build:
    runs-on: ubuntu-latest

    steps:
      # Hämta källkoden.
      - uses: actions/checkout@v4

      # Installera .NET 8 SDK (matchar projektets net8.0-target).
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # Cacha NuGet-paket för snabbare restores mellan körningar och workflows.
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # Restore innan build/test så project.assets.json alltid finns.
      - name: Restore dependencies
        run: dotnet restore
